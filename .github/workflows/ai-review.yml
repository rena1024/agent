name: AI Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.demo_message.outputs.final-message || steps.run_codex.outputs.final-message || '' }}

    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Check AI review secret
        id: secret_check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY is not configured; skipping AI review."
          fi

      - name: Pre-fetch base and head refs
        if: steps.secret_check.outputs.enabled == 'true'
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Demo AI verification message
        id: demo_message
        if: steps.secret_check.outputs.enabled == 'true' && contains(github.event.pull_request.title, '[ai-review-demo]')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          payload = {
              "model": "gpt-5.4-mini",
              "input": (
                  "Output exactly this sentence and nothing else: "
                  "AI review demo: OPENAI_API_KEY is configured and OpenAI API access "
                  "is working for GitHub Actions."
              ),
          }

          req = urllib.request.Request(
              "https://api.openai.com/v1/responses",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {os.environ['OPENAI_API_KEY']}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          with urllib.request.urlopen(req, timeout=60) as resp:
              data = json.load(resp)

          text = data.get("output_text", "").strip()
          if not text:
              for item in data.get("output", []):
                  for content in item.get("content", []):
                      if content.get("type") == "output_text":
                          text = str(content.get("text", "")).strip()
                          if text:
                              break
                  if text:
                      break

          if not text:
              raise SystemExit("No text returned from Responses API")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"final-message={text}\n")
          PY

      - name: Run Codex review
        id: run_codex
        if: steps.secret_check.outputs.enabled == 'true' && !contains(github.event.pull_request.title, '[ai-review-demo]')
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: drop-sudo
          model: gpt-5.4-mini
          effort: low
          prompt: |
            Review PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.
            Review only the changes introduced by this pull request.
            Focus on bugs, regressions, missing tests, and security or configuration risks.
            Keep the response concise.
            If there are no actionable findings, output exactly: NO_ACTIONABLE_ISSUES

            Demo override:
            - If the pull request title contains [ai-review-demo], output exactly:
              AI review demo: OPENAI_API_KEY is configured and Codex review ran successfully.

  post_feedback:
    needs: review
    if: needs.review.outputs.final_message != '' && needs.review.outputs.final_message != 'NO_ACTIONABLE_ISSUES'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Post AI review comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
