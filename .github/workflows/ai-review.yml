name: AI Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message || '' }}

    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Check AI review secret
        id: secret_check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY is not configured; skipping AI review."
          fi

      - name: Pre-fetch base and head refs
        if: steps.secret_check.outputs.enabled == 'true'
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex review
        id: run_codex
        if: steps.secret_check.outputs.enabled == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: drop-sudo
          model: gpt-5.4-mini
          effort: low
          prompt: |
            Review PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.

            Review ONLY the changes introduced by this pull request. Use the local git history and diff:
              git log --oneline ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}
              git diff --stat ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

            Focus on:
            - bugs or correctness issues
            - behavioral regressions
            - missing tests
            - security or configuration risks

            Keep feedback concise and specific. Use markdown.
            If there are no actionable findings, output exactly:
            NO_ACTIONABLE_ISSUES

            Pull request title:
            ${{ github.event.pull_request.title }}

            Pull request body:
            ${{ github.event.pull_request.body }}

  post_feedback:
    needs: review
    if: needs.review.outputs.final_message != '' && needs.review.outputs.final_message != 'NO_ACTIONABLE_ISSUES'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Post AI review comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
